<div class="tool-strip" data-testid="tool-strip" role="toolbar" aria-label="Editor tools">
  @for (group of toolRegistry.stripGroups(); track group.id) {
    <div class="tool-group" [attr.aria-label]="group.ariaLabel">
      @for (tool of group.descriptors; track tool.id) {
        <button
          type="button"
          class="tool-btn tool-btn-icon"
          [attr.data-testid]="tool.stripTestId"
          [class.active]="editorTool.currentTool() === tool.id"
          (click)="setTool(tool.id)"
          [title]="tool.title"
          [attr.aria-label]="tool.ariaLabel"
          [attr.aria-pressed]="editorTool.currentTool() === tool.id">
          <span class="tool-icon" aria-hidden="true">
            <mat-icon class="tool-mat-icon">{{ tool.icon }}</mat-icon>
          </span>
        </button>
      }
      @if (group.id === 'creation') {
        <input
          #imageFileInput
          type="file"
          class="tool-strip-file-input"
          data-testid="input-insert-image-file"
          accept="image/*"
          aria-hidden="true"
          tabindex="-1"
          (change)="onRasterImageFileChosen($event)"
        />
        <button
          type="button"
          class="tool-btn tool-btn-icon"
          data-testid="tool-insert-image"
          [disabled]="insertImageDisabled()"
          (click)="openInsertImagePicker()"
          title="Insert image"
          aria-label="Insert image">
          <span class="tool-icon" aria-hidden="true">
            <mat-icon class="tool-mat-icon">image</mat-icon>
          </span>
        </button>
      }
    </div>
  }
  <div class="tool-group tool-group-defaults" aria-label="Creation paint defaults">
    <app-creation-paint-defaults></app-creation-paint-defaults>
  </div>
</div>
