<div class="ruler-corner" aria-hidden="true"></div>
<div class="ruler-top" aria-hidden="true">
  <svg [attr.width]="wrapperWidth()" [attr.height]="rulerSize()" class="ruler-svg">
    @for (tick of horizontalTicks(); track tick.position + ',' + tick.value) {
      <line
        [attr.x1]="tick.position"
        [attr.y1]="rulerSize()"
        [attr.x2]="tick.position"
        [attr.y2]="tick.major ? rulerSize() - 8 : rulerSize() - 4"
        stroke="#666"/>
      @if (tick.major) {
        <text [attr.x]="tick.position" [attr.y]="10" text-anchor="middle" class="ruler-text">{{ tick.value }}</text>
      }
    }
  </svg>
</div>
<div class="ruler-left" #rulerLeft aria-hidden="true">
  <svg [attr.width]="rulerSize()" class="ruler-svg">
    @for (tick of verticalTicks(); track tick.position + ',' + tick.value) {
      <line
        [attr.x1]="rulerSize()"
        [attr.y1]="tick.position"
        [attr.x2]="tick.major ? rulerSize() - 8 : rulerSize() - 4"
        [attr.y2]="tick.position"
        stroke="#666"/>
      @if (tick.major) {
        <text [attr.x]="12" [attr.y]="tick.position" text-anchor="middle" dominant-baseline="middle" class="ruler-text">{{ tick.value }}</text>
      }
    }
  </svg>
</div>
