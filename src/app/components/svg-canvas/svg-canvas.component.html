<div
  class="canvas-container"
  data-testid="canvas-root"
  [class.zoom-mode]="editorTool.currentTool() === 'zoom'"
  [class.zoom-mode-out]="editorTool.currentTool() === 'zoom' && altKeyPressed"
  [class.pan-mode]="editorTool.currentTool() === 'pan'"
  [class.pan-dragging]="isPanning"
  [class.creation-mode]="editorTool.isCreationTool()"
  [class.pen-mode]="editorTool.currentTool() === 'pen'">
  @if (svgContent()) {
    <div class="zoom-level" data-testid="canvas-zoom-level" aria-label="Zoom level">{{ zoomLevelPercent }}%</div>
  }
  <div class="ruler-wrapper" [class.with-rulers]="!!svgContent()">
    @if (svgContent()) {
      <div class="ruler-corner" aria-hidden="true"></div>
      <div class="ruler-top" aria-hidden="true">
        <svg [attr.width]="wrapperWidth" [attr.height]="RULER_SIZE" class="ruler-svg">
          @for (tick of horizontalRulerTicks; track tick.position + ',' + tick.value) {
            <line [attr.x1]="tick.position" [attr.y1]="RULER_SIZE" [attr.x2]="tick.position" [attr.y2]="tick.major ? RULER_SIZE - 8 : RULER_SIZE - 4" stroke="#666"/>
            @if (tick.major) {
              <text [attr.x]="tick.position" [attr.y]="10" text-anchor="middle" class="ruler-text">{{ tick.value }}</text>
            }
          }
        </svg>
      </div>
      <div class="ruler-left" aria-hidden="true">
        <svg [attr.width]="RULER_SIZE" [attr.height]="wrapperHeight" class="ruler-svg">
          @for (tick of verticalRulerTicks; track tick.position + ',' + tick.value) {
            <line [attr.x1]="RULER_SIZE" [attr.y1]="tick.position" [attr.x2]="tick.major ? RULER_SIZE - 8 : RULER_SIZE - 4" [attr.y2]="tick.position" stroke="#666"/>
            @if (tick.major) {
              <text [attr.x]="12" [attr.y]="tick.position" text-anchor="middle" dominant-baseline="middle" class="ruler-text">{{ tick.value }}</text>
            }
          }
        </svg>
      </div>
    }
    <div
      class="svg-canvas"
      #canvasViewport
      data-testid="canvas-viewport"
      role="application"
      aria-label="SVG drawing canvas"
      (click)="onCanvasClick($event)"
      (dblclick)="onCanvasDoubleClick($event)"
      (mousedown)="onCanvasMouseDown($event)">
      <div class="canvas-inner">
      <div
        #zoomWrapper
        class="svg-zoom-wrapper"
        [style.transform]="'translate(' + canvasView.panX + 'px,' + canvasView.panY + 'px) scale(' + canvasView.scale + ')'"
        style="transform-origin: 0 0">
        <div #svgContainer></div>
      </div>
      <div
        #highlightOverlayContainer
        class="highlight-overlay-container"
        data-testid="canvas-selection-overlay"
        aria-hidden="true"
        [style.left.px]="canvasView.panX"
        [style.top.px]="canvasView.panY"
        [style.width.px]="overlayWidthPx"
        [style.height.px]="overlayHeightPx">
        <svg
          class="highlight-overlay"
          data-testid="canvas-selection-overlay-svg"
          [attr.viewBox]="'0 0 ' + overlayWidthPx + ' ' + overlayHeightPx"
          preserveAspectRatio="none"
          overflow="visible">
          @if (viewBoxOverlayRect) {
            <rect
              [attr.x]="viewBoxOverlayRect.x"
              [attr.y]="viewBoxOverlayRect.y"
              [attr.width]="viewBoxOverlayRect.width"
              [attr.height]="viewBoxOverlayRect.height"
              fill="none"
              stroke="#000000"
              stroke-width="1"/>
          }
          @if (highlightRect; as hr) {
            @if (isRotatingSelection) {
              <g [attr.transform]="selectionRotateHighlightTransform(hr)">
                <rect
                  [attr.x]="hr.x"
                  [attr.y]="hr.y"
                  [attr.width]="hr.width"
                  [attr.height]="hr.height"
                  fill="none"
                  stroke="#2196F3"
                  stroke-width="2"/>
              </g>
            } @else if (multiSelectionOutlineRects.length >= 2) {
              @for (r of multiSelectionOutlineRects; track r.id) {
                <rect
                  [attr.x]="r.x"
                  [attr.y]="r.y"
                  [attr.width]="r.width"
                  [attr.height]="r.height"
                  fill="none"
                  stroke="#2196F3"
                  stroke-width="1.5"
                  stroke-dasharray="4 3"
                  vector-effect="non-scaling-stroke"/>
              }
            } @else {
              <rect
                [attr.x]="hr.x"
                [attr.y]="hr.y"
                [attr.width]="hr.width"
                [attr.height]="hr.height"
                fill="none"
                stroke="#2196F3"
                stroke-width="2"/>
            }
          }
          @if (creationGhostRect; as ghost) {
            @if (creationShapeType === 'ellipse') {
              <ellipse
                class="creation-ghost-shape"
                data-testid="canvas-creation-ghost"
                [attr.cx]="ghost.x + ghost.width / 2"
                [attr.cy]="ghost.y + ghost.height / 2"
                [attr.rx]="ghost.width / 2"
                [attr.ry]="ghost.height / 2"
                fill="rgba(33, 150, 243, 0.08)"
                stroke="#2196f3"
                stroke-width="2"
                stroke-dasharray="6 3"
                vector-effect="non-scaling-stroke"/>
            } @else if (creationShapeType === 'line') {
              @if (creationGhostLineOverlay; as gl) {
                <line
                  class="creation-ghost-shape"
                  data-testid="canvas-creation-ghost"
                  [attr.x1]="gl.x1"
                  [attr.y1]="gl.y1"
                  [attr.x2]="gl.x2"
                  [attr.y2]="gl.y2"
                  stroke="#2196f3"
                  stroke-width="2"
                  stroke-dasharray="6 3"
                  vector-effect="non-scaling-stroke"/>
              }
            } @else {
              <rect
                class="creation-ghost-shape"
                data-testid="canvas-creation-ghost"
                [attr.x]="ghost.x"
                [attr.y]="ghost.y"
                [attr.width]="ghost.width"
                [attr.height]="ghost.height"
                fill="rgba(33, 150, 243, 0.08)"
                stroke="#2196f3"
                stroke-width="2"
                stroke-dasharray="6 3"
                vector-effect="non-scaling-stroke"/>
            }
          }
          @if (penCurvePreviewPathD; as pcurve) {
            <path
              class="creation-ghost-shape"
              data-testid="canvas-pen-curve-preview"
              [attr.d]="pcurve"
              fill="none"
              stroke="#2196f3"
              stroke-width="2"
              stroke-dasharray="6 3"
              vector-effect="non-scaling-stroke"/>
            @for (h of penCurveHandleOverlays; track h.cx + ',' + h.cy) {
              <circle
                class="pen-curve-handle"
                data-testid="canvas-pen-curve-handle"
                [attr.cx]="h.cx"
                [attr.cy]="h.cy"
                r="4"
                fill="#ffffff"
                stroke="#2196f3"
                stroke-width="1.5"
                vector-effect="non-scaling-stroke"/>
            }
          }
          @if (penRubberBandOverlay; as prb) {
            <line
              class="creation-ghost-shape"
              data-testid="canvas-pen-rubber-band"
              [attr.x1]="prb.x1"
              [attr.y1]="prb.y1"
              [attr.x2]="prb.x2"
              [attr.y2]="prb.y2"
              stroke="#2196f3"
              stroke-width="2"
              stroke-dasharray="6 3"
              vector-effect="non-scaling-stroke"/>
          }
          @if (showResizeHandles && highlightRect; as hr) {
            <circle
              class="selection-resize-handle selection-resize-nw"
              r="5"
              data-resize-handle="nw"
              data-testid="canvas-handle-resize-nw"
              [attr.cx]="hr.x"
              [attr.cy]="hr.y"/>
            <circle
              class="selection-resize-handle selection-resize-ne"
              r="5"
              data-resize-handle="ne"
              data-testid="canvas-handle-resize-ne"
              [attr.cx]="hr.x + hr.width"
              [attr.cy]="hr.y"/>
            <circle
              class="selection-resize-handle selection-resize-sw"
              r="5"
              data-resize-handle="sw"
              data-testid="canvas-handle-resize-sw"
              [attr.cx]="hr.x"
              [attr.cy]="hr.y + hr.height"/>
            <circle
              class="selection-resize-handle selection-resize-se"
              r="5"
              data-resize-handle="se"
              data-testid="canvas-handle-resize-se"
              [attr.cx]="hr.x + hr.width"
              [attr.cy]="hr.y + hr.height"/>
            <line
              class="selection-rotate-stem"
              data-testid="canvas-rotate-stem"
              [attr.x1]="hr.x + hr.width / 2"
              [attr.y1]="hr.y"
              [attr.x2]="hr.x + hr.width / 2"
              [attr.y2]="hr.y - rotateHandleOffset"
              pointer-events="none"/>
            <circle
              class="selection-rotate-handle"
              r="5"
              data-rotate-handle=""
              data-testid="canvas-handle-rotate"
              [attr.cx]="hr.x + hr.width / 2"
              [attr.cy]="hr.y - rotateHandleOffset"/>
          }
        </svg>
      </div>
    </div>
  </div>
  </div>
  @if (zoomMarqueeRect; as rect) {
    <div
      class="zoom-marquee"
      data-testid="canvas-zoom-marquee"
      aria-hidden="true"
      [style.left.px]="rect.left"
      [style.top.px]="rect.top"
      [style.width.px]="rect.width"
      [style.height.px]="rect.height"></div>
  }
  @if (selectionMarqueeRect; as selRect) {
    <div
      class="selection-marquee"
      data-testid="canvas-selection-marquee"
      aria-hidden="true"
      [style.left.px]="selRect.left"
      [style.top.px]="selRect.top"
      [style.width.px]="selRect.width"
      [style.height.px]="selRect.height"></div>
  }
  @if (!svgContent()) {
    <div class="placeholder" data-testid="canvas-empty-placeholder">
      <p>Load an SVG file to begin editing</p>
    </div>
  }
</div>
