<div
  class="creation-paint-defaults"
  data-testid="creation-paint-defaults"
  role="group"
  aria-label="Creation paint defaults">
  <div class="swatch-stack" aria-hidden="false">
    <div class="swatch-slot swatch-slot-fill" data-testid="creation-default-fill">
      <span class="swatch-caption">Fill</span>
      <app-color-picker
        [color]="fillEmpty() ? '#000000' : defaults.fill()"
        [empty]="fillEmpty()"
        [clearable]="true"
        (colorChange)="onFillChange($event)" />
    </div>
  </div>
  <label class="stroke-width-field" for="creation-default-stroke-width">
    <span class="swatch-caption">Width</span>
    <input
      id="creation-default-stroke-width"
      type="number"
      class="stroke-width-input"
      data-testid="creation-default-stroke-width"
      min="0"
      max="40"
      step="0.5"
      [value]="defaults.strokeWidth()"
      (change)="onStrokeWidthChange($event)"
      aria-label="Default stroke width" />
  </label>
</div>
