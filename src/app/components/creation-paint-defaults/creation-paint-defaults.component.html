<div
  class="creation-paint-defaults"
  data-testid="creation-paint-defaults"
  role="group"
  aria-label="Creation paint defaults">
  <div class="swatch-stack" aria-hidden="false">
    <div class="swatch-slot swatch-slot-fill" data-testid="creation-default-fill">
      <span class="swatch-caption">Fill</span>
      <app-color-picker
        [color]="fillEmpty() ? '#000000' : defaults.fill()"
        [empty]="fillEmpty()"
        [clearable]="true"
        (colorChange)="onFillChange($event)" />
    </div>
    <div class="swatch-slot swatch-slot-stroke" data-testid="creation-default-stroke">
      <span class="swatch-caption">Stroke</span>
      <app-color-picker
        [color]="strokeEmpty() ? '#000000' : defaults.stroke()"
        [empty]="strokeEmpty()"
        [clearable]="true"
        (colorChange)="onStrokeChange($event)" />
    </div>
  </div>
</div>
