<section
  class="tool-context-bar"
  data-testid="editor-tool-context-bar"
  role="region"
  aria-label="Tool options">
  @switch (editorTool.currentTool()) {
    @case ('selector') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('node-edit-selector') {
      <div class="context-slot node-edit-context" data-testid="node-edit-tool-context">
        <app-path-node-anchor-tools />
      </div>
    }
    @case ('eyedropper') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('zoom') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('pan') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('rect') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('ellipse') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('line') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('text') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('pen') {
      <div class="context-slot pen-context" data-testid="pen-tool-context">
        <button
          type="button"
          class="pen-alt-curve-toggle"
          data-testid="pen-alt-curve-toggle"
          [class.active]="editorTool.penAltCurveMode()"
          [attr.aria-pressed]="editorTool.penAltCurveMode()"
          title="Alternate curve (Q/S/T). Hold Control while dragging a segment, or turn on here."
          (click)="togglePenAltCurveMode()">
          Alt curve
        </button>
        <span class="pen-curve-hint" data-testid="pen-curve-mode-hint" aria-live="polite">
          {{ penCurveModeHint() }}
        </span>
      </div>
    }
    @default {
      <div class="context-slot" aria-hidden="true"></div>
    }
  }
</section>
