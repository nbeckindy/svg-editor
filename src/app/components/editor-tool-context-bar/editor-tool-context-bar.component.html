<section
  class="tool-context-bar"
  data-testid="editor-tool-context-bar"
  role="region"
  aria-label="Tool options">
  @switch (editorTool.currentTool()) {
    @case ('selector') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('node-edit-selector') {
      <div class="context-slot node-edit-context" data-testid="node-edit-tool-context">
        <app-path-node-anchor-tools />
      </div>
    }
    @case ('eyedropper') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('zoom') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('pan') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('rect') {
      <div class="context-slot rect-tool-context-slot" data-testid="rect-tool-context-slot">
        <app-rect-tool-context />
      </div>
    }
    @case ('ellipse') {
      <div class="context-slot ellipse-tool-context-slot" data-testid="ellipse-tool-context-slot">
        <app-ellipse-tool-context />
      </div>
    }
    @case ('line') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('text') {
      <div class="context-slot" aria-hidden="true"></div>
    }
    @case ('pen') {
      <div class="context-slot" aria-hidden="true" data-testid="pen-tool-context"></div>
    }
    @default {
      <div class="context-slot" aria-hidden="true"></div>
    }
  }
</section>
