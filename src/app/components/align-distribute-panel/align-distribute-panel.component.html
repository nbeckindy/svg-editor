<div class="align-distribute-panel" data-testid="align-distribute-panel">
  @if (!hasSelection()) {
    <div class="empty-state">
      <p class="hint">Select two or more shapes to align or distribute</p>
    </div>
  } @else if (!isSelectorMode()) {
    <div class="empty-state">
      <p class="hint">Switch to the select tool to align or distribute</p>
    </div>
  } @else {
    <div class="property-group align-distribute-group">
      <label class="property-label">Align</label>
      <div class="align-toolbar">
        <button
          type="button"
          class="align-btn"
          data-testid="align-left"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align left (' + alignShortcutLabels.left + ')'"
          (click)="onAlign('left')">
          Left
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="align-center"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align center (' + alignShortcutLabels.center + ')'"
          (click)="onAlign('center')">
          Center
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="align-right"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align right (' + alignShortcutLabels.right + ')'"
          (click)="onAlign('right')">
          Right
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="align-top"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align top (' + alignShortcutLabels.top + ')'"
          (click)="onAlign('top')">
          Top
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="align-middle"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align middle (' + alignShortcutLabels.middle + ')'"
          (click)="onAlign('middle')">
          Middle
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="align-bottom"
          [disabled]="!canAlignSelection() || anySelectedShapeLocked()"
          [attr.title]="'Align bottom (' + alignShortcutLabels.bottom + ')'"
          (click)="onAlign('bottom')">
          Bottom
        </button>
      </div>

      <label class="property-label distribute-label">Distribute</label>
      <div class="align-toolbar distribute-toolbar">
        <button
          type="button"
          class="align-btn"
          data-testid="distribute-horizontal"
          [disabled]="!canDistributeSelection() || anySelectedShapeLocked()"
          [attr.title]="'Distribute horizontally (' + alignShortcutLabels.distributeHorizontal + ')'"
          (click)="onDistribute('horizontal')">
          Horizontal
        </button>
        <button
          type="button"
          class="align-btn"
          data-testid="distribute-vertical"
          [disabled]="!canDistributeSelection() || anySelectedShapeLocked()"
          [attr.title]="'Distribute vertically (' + alignShortcutLabels.distributeVertical + ')'"
          (click)="onDistribute('vertical')">
          Vertical
        </button>
      </div>
    </div>
  }
</div>
