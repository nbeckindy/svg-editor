@if (draftModel(); as d) {
  <fieldset class="gradient-editor" [disabled]="disabled()" data-testid="gradient-fill-editor-root">
    <div class="row">
      <span class="property-label">Type</span>
      <label>
        <input
          type="radio"
          name="gk"
          [checked]="d.kind === 'linear'"
          (change)="onKindChange('linear')" />
        Linear
      </label>
      <label>
        <input
          type="radio"
          name="gk"
          [checked]="d.kind === 'radial'"
          (change)="onKindChange('radial')" />
        Radial
      </label>
    </div>

    <app-gradient-stop-slider
      [kind]="d.kind"
      [stops]="d.stops"
      [previewCss]="previewCss()"
      [disabled]="disabled()"
      [selectedIndex]="selectedStopIndex()"
      [endpointSpan]="endpointSpan()"
      (stopsChange)="onStopsChange($event)"
      (selectedIndexChange)="onSelectedStopIndexChange($event)"
      (addStopAt)="onAddStopAt($event)"
      (removeStop)="onRemoveStop($event)"
      (endpointSpanChange)="onEndpointSpanChange($event)"
      (interactingChange)="onInteractingChange($event)"
      data-testid="gradient-fill-editor-stop-slider" />

    @if (d.stops[selectedStopIndex()]; as selectedStop) {
      <div class="property-group">
        <span class="property-label">Stop color</span>
        <app-color-picker
          [color]="selectedStop.color"
          [disabled]="disabled()"
          (colorChange)="onStopColor($event)" />
      </div>
    }

    @if (d.kind === 'linear') {
      <div class="property-group">
        <label class="property-label" for="gradient-angle">Angle</label>
        <div class="range-input-group">
          <input
            id="gradient-angle"
            type="range"
            class="range-slider"
            min="0"
            max="360"
            step="1"
            [value]="angleDegrees()"
            [disabled]="disabled()"
            data-testid="gradient-fill-editor-angle-range"
            (input)="onAngleInput($event)"
            (change)="onAngleChange()" />
          <input
            type="number"
            class="range-number"
            min="0"
            max="360"
            step="1"
            [value]="angleDegrees()"
            [disabled]="disabled()"
            data-testid="gradient-fill-editor-angle-number"
            (input)="onAngleInput($event)"
            (change)="onAngleChange()" />
        </div>
      </div>
    } @else {
      <div class="property-group">
        <label class="property-label" for="gradient-radial-cx">Center X</label>
        <div class="range-input-group">
          <input
            id="gradient-radial-cx"
            type="range"
            class="range-slider"
            min="0"
            max="100"
            step="1"
            [value]="radialCenterX()"
            [disabled]="disabled()"
            data-testid="gradient-fill-editor-radial-cx"
            (input)="onRadialCenterInput('cx', $event)"
            (change)="onRadialControlChange()" />
          <input
            type="number"
            class="range-number"
            min="0"
            max="100"
            step="1"
            [value]="radialCenterX()"
            [disabled]="disabled()"
            (input)="onRadialCenterInput('cx', $event)"
            (change)="onRadialControlChange()" />
        </div>
      </div>
      <div class="property-group">
        <label class="property-label" for="gradient-radial-cy">Center Y</label>
        <div class="range-input-group">
          <input
            id="gradient-radial-cy"
            type="range"
            class="range-slider"
            min="0"
            max="100"
            step="1"
            [value]="radialCenterY()"
            [disabled]="disabled()"
            data-testid="gradient-fill-editor-radial-cy"
            (input)="onRadialCenterInput('cy', $event)"
            (change)="onRadialControlChange()" />
          <input
            type="number"
            class="range-number"
            min="0"
            max="100"
            step="1"
            [value]="radialCenterY()"
            [disabled]="disabled()"
            (input)="onRadialCenterInput('cy', $event)"
            (change)="onRadialControlChange()" />
        </div>
      </div>
      <div class="property-group">
        <label class="property-label" for="gradient-radial-r">Radius</label>
        <div class="range-input-group">
          <input
            id="gradient-radial-r"
            type="range"
            class="range-slider"
            min="0"
            max="100"
            step="1"
            [value]="radialRadius()"
            [disabled]="disabled()"
            data-testid="gradient-fill-editor-radial-r"
            (input)="onRadialRadiusInput($event)"
            (change)="onRadialControlChange()" />
          <input
            type="number"
            class="range-number"
            min="0"
            max="100"
            step="1"
            [value]="radialRadius()"
            [disabled]="disabled()"
            (input)="onRadialRadiusInput($event)"
            (change)="onRadialControlChange()" />
        </div>
      </div>
    }
  </fieldset>
}
