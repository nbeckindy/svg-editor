<div class="layers-panel">
  <div class="panel-header">
    <h3>Layers</h3>
    <div class="panel-actions">
      <button type="button" class="panel-action-btn" title="Group selected"
              data-testid="layers-group-btn"
              aria-label="Group selected layers"
              [disabled]="selectionCount() < 2"
              (click)="onGroupSelected()">
        <span aria-hidden="true">⊞</span>
      </button>
      <button type="button" class="panel-action-btn" title="Ungroup"
              data-testid="layers-ungroup-btn"
              aria-label="Ungroup selected group"
              [disabled]="!canUngroup()"
              (click)="onUngroupSelected()">
        <span aria-hidden="true">⊟</span>
      </button>
      <button type="button" class="panel-action-btn" title="Add selection to group"
              data-testid="layers-add-to-group-btn"
              aria-label="Add selection to group"
              [disabled]="!canAddToGroup()"
              (click)="onAddToGroupSelected()">
        <span aria-hidden="true">⊕</span>
      </button>
      <button type="button" class="panel-action-btn" title="Remove from group"
              data-testid="layers-remove-from-group-btn"
              aria-label="Remove selection from group"
              [disabled]="!canRemoveFromGroup()"
              (click)="onRemoveFromGroupSelected()">
        <span aria-hidden="true">⊖</span>
      </button>
    </div>
  </div>

  @if (flattenedLayers().length > 0) {
    <div
      class="layers-list"
      data-testid="layers-list"
      cdkDropList
      cdkDropListLockAxis="y"
      [cdkDropListData]="flattenedLayers()"
      (cdkDropListDropped)="onLayerListDropped($event)">
      @for (layer of flattenedLayers(); track layer.id) {
        <div
          class="layer-row"
          cdkDrag
          [cdkDragData]="layer"
          [cdkDragDisabled]="isLayerDragDisabled(layer)"
          (cdkDragMoved)="onLayerDragMoved($event)"
          (cdkDragEnded)="onLayerDragEnded()"
          [class.selected]="layer.selected"
          [class.group-row]="layer.isGroup"
          [class.hidden-layer]="!layer.visible"
          [class.locked-layer]="layer.locked"
          [class.drop-before]="dropPreview()?.targetId === layer.id && dropPreview()?.zone === 'before'"
          [class.drop-after]="dropPreview()?.targetId === layer.id && dropPreview()?.zone === 'after'"
          [class.drop-into-group]="dropPreview()?.targetId === layer.id && dropPreview()?.zone === 'intoGroup'"
          [style.padding-left.px]="12 + layer.depth * 16"
          [style.--drop-depth]="layer.depth"
          [title]="layer.name"
          [attr.data-testid]="'layer-row-' + layer.id"
          [attr.aria-label]="layer.name + ' (' + layer.type + ')'"
          (click)="onLayerClick(layer.id, $event)"
          (contextmenu)="onLayerContextMenu(layer.id, $event)">

          @if (layer.isGroup) {
            <span class="group-chevron"
                  [class.expanded]="layer.isExpanded"
                  (click)="toggleGroupExpanded(layer.id); $event.stopPropagation()"
                  data-testid="layer-group-toggle"
                  aria-hidden="true">▶</span>
          }

          <span
            class="layer-drag-handle"
            cdkDragHandle
            [attr.data-testid]="'layer-drag-handle-' + layer.id"
            title="Drag to reorder"
            aria-hidden="true"
            (click)="$event.stopPropagation()">⋮⋮</span>

          <button type="button" class="visibility-toggle"
                  [attr.aria-label]="layer.visible ? 'Hide ' + layer.name : 'Show ' + layer.name"
                  [attr.data-testid]="'layer-visibility-' + layer.id"
                  (click)="onVisibilityToggle(layer.id); $event.stopPropagation()">
            <mat-icon
              class="layer-row-mdi"
              aria-hidden="true"
              [svgIcon]="layer.visible ? 'eye-outline' : 'eye-off-outline'"></mat-icon>
          </button>

          <button type="button" class="lock-toggle"
                  [attr.aria-label]="layer.locked ? 'Unlock ' + layer.name : 'Lock ' + layer.name"
                  [attr.data-testid]="'layer-lock-' + layer.id"
                  (click)="onLockToggle(layer.id); $event.stopPropagation()">
            <mat-icon
              class="layer-row-mdi"
              aria-hidden="true"
              [svgIcon]="layer.locked ? 'lock-outline' : 'lock-open-variant-outline'"></mat-icon>
          </button>

          <img class="layer-preview" [src]="layer.previewUrl" [alt]="layer.type + ' preview'" />

          <div class="layer-meta">
            <div class="layer-name">{{ layer.name }}</div>
            <div class="layer-type">{{ layer.type }}</div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="empty-state">
      <p>No layers loaded</p>
      <p class="hint">Load an SVG to inspect stack order</p>
    </div>
  }

  <button
    type="button"
    class="layer-context-menu-trigger"
    aria-hidden="true"
    tabindex="-1"
    [matMenuTriggerFor]="layerContextMenu"
    #contextMenuTrigger="matMenuTrigger"></button>

  <mat-menu #layerContextMenu="matMenu" class="layer-context-menu-panel">
    <button
      mat-menu-item
      type="button"
      data-testid="layer-context-menu-to-front"
      [disabled]="isLayerReorderDisabled(contextMenuLayerId())"
      (click)="onContextMenuMoveToFront()">
      Bring to front
    </button>
    <button
      mat-menu-item
      type="button"
      data-testid="layer-context-menu-forward"
      [disabled]="isLayerReorderDisabled(contextMenuLayerId())"
      (click)="onContextMenuMoveForward()">
      Move forward
    </button>
    <button
      mat-menu-item
      type="button"
      data-testid="layer-context-menu-backward"
      [disabled]="isLayerReorderDisabled(contextMenuLayerId())"
      (click)="onContextMenuMoveBackward()">
      Move backward
    </button>
    <button
      mat-menu-item
      type="button"
      data-testid="layer-context-menu-to-back"
      [disabled]="isLayerReorderDisabled(contextMenuLayerId())"
      (click)="onContextMenuMoveToBack()">
      Send to back
    </button>
  </mat-menu>
</div>
