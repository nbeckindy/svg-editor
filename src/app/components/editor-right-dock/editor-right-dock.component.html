<aside class="right-dock" data-testid="editor-right-dock">
  <div
    class="dock-expanded"
    data-testid="dock-expanded-region"
    [hidden]="layout.dockCollapsed()">
    <div class="dock-tab-row">
      <div
        class="dock-tabs"
        role="tablist"
        aria-label="Inspector panels"
        [style.grid-template-columns]="tabGridColumns()">
        @for (panel of dockPanels(); track panel.id) {
          <button
            type="button"
            role="tab"
            class="dock-tab"
            [attr.data-testid]="panel.tabTestId"
            [class.active]="layout.activeDockPanel() === panel.id"
            [attr.aria-selected]="layout.activeDockPanel() === panel.id"
            (click)="layout.selectDockPanel(panel.id)">
            {{ panel.label }}
          </button>
        }
      </div>
      <button
        type="button"
        class="dock-collapse-btn"
        data-testid="dock-collapse"
        aria-label="Collapse inspector"
        (click)="layout.collapseDock()">
        <span class="dock-collapse-glyph" aria-hidden="true">⟩</span>
      </button>
    </div>

    @for (panel of dockPanels(); track panel.id) {
      <section
        [class]="panel.panelClass ? 'dock-panel ' + panel.panelClass : 'dock-panel'"
        [attr.data-testid]="panel.areaTestId"
        [hidden]="isPanelInactive(panel.id)"
        [attr.inert]="isPanelInactive(panel.id) ? '' : null"
        role="tabpanel"
        [attr.aria-label]="panel.ariaLabel">
        <ng-container *ngComponentOutlet="panel.component" />
      </section>
    }
  </div>

  <button
    type="button"
    class="dock-expand-handle"
    data-testid="dock-expand-handle"
    aria-label="Expand inspector"
    [hidden]="!layout.dockCollapsed()"
    (click)="layout.expandDock()">
    <span class="dock-expand-glyph" aria-hidden="true">⟨</span>
  </button>
</aside>
