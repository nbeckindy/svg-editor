<div class="app-shell" data-testid="app-root">
  <app-editor-top-bar
    [hasSvgContent]="!!svgContent"
    (newCanvas)="onNewCanvas()"
    (download)="downloadSvg()"
  />

  <app-editor-tool-context-bar />

  <main
    class="workspace"
    data-testid="editor-main"
    [class.workspace--dock-collapsed]="dockCollapsed()">
    <app-editor-left-rail (svgLoaded)="onSVGLoaded($event)" />

    <section class="canvas-column" data-testid="editor-canvas-column">
      <div class="canvas-area" data-testid="editor-canvas-area">
        <app-svg-canvas data-testid="editor-svg-canvas" [svgContent]="svgContent"></app-svg-canvas>
      </div>
      <div class="debug-strip" data-testid="editor-debug-strip">
        <app-svg-debug-panel
          data-testid="editor-svg-debug-panel"
          (svgContentApplied)="onSVGLoaded($event)"></app-svg-debug-panel>
      </div>
    </section>

    <app-editor-right-dock
      [(activeDockPanel)]="activeDockPanel"
      [dockCollapsed]="dockCollapsed()"
      (dockCollapsedChange)="dockCollapsed.set($event)"
    />
  </main>
</div>
