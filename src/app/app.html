<div class="app-shell" data-testid="app-root">
  <header class="top-bar" data-testid="editor-top-bar">
    <div class="brand-cluster">
      <h1>Angular SVG Editor</h1>
      <span class="mode-badge">Illustration workspace</span>
    </div>
    <div class="top-actions" role="toolbar" aria-label="Document actions">
      <button
        type="button"
        class="action-btn primary"
        data-testid="new-canvas-button"
        (click)="onNewCanvas()">
        New
      </button>
      <button
        type="button"
        class="action-btn"
        data-testid="download-svg-button"
        [disabled]="!svgContent"
        (click)="downloadSvg()">
        Download SVG
      </button>
    </div>
  </header>

  <main class="workspace" data-testid="editor-main">
    <aside class="left-rail" data-testid="editor-left-rail">
      <app-tool-strip data-testid="editor-tool-strip"></app-tool-strip>
      <section class="asset-library" data-testid="editor-asset-library">
        <h2>Assets</h2>
        <app-icon-palette
          data-testid="editor-icon-palette"
          (svgLoaded)="onSVGLoaded($event)"></app-icon-palette>
      </section>
    </aside>

    <section class="canvas-column" data-testid="editor-canvas-column">
      <div class="canvas-area" data-testid="editor-canvas-area">
        <app-svg-canvas data-testid="editor-svg-canvas" [svgContent]="svgContent"></app-svg-canvas>
      </div>
      <div class="debug-strip" data-testid="editor-debug-strip">
        <app-svg-debug-panel data-testid="editor-svg-debug-panel"></app-svg-debug-panel>
      </div>
    </section>

    <aside class="right-dock" data-testid="editor-right-dock">
      <div class="dock-tabs" role="tablist" aria-label="Inspector panels">
        <button
          type="button"
          role="tab"
          class="dock-tab"
          data-testid="dock-tab-properties"
          [class.active]="activeDockPanel === 'properties'"
          [attr.aria-selected]="activeDockPanel === 'properties'"
          [attr.aria-pressed]="activeDockPanel === 'properties'"
          (click)="setActiveDockPanel('properties')">
          Properties
        </button>
        <button
          type="button"
          role="tab"
          class="dock-tab"
          data-testid="dock-tab-layers"
          [class.active]="activeDockPanel === 'layers'"
          [attr.aria-selected]="activeDockPanel === 'layers'"
          [attr.aria-pressed]="activeDockPanel === 'layers'"
          (click)="setActiveDockPanel('layers')">
          Layers
        </button>
      </div>

      <section
        class="dock-panel properties-panel"
        data-testid="editor-properties-area"
        [class.hidden]="activeDockPanel !== 'properties'">
        <app-properties-panel data-testid="editor-properties-panel"></app-properties-panel>
      </section>

      <section
        class="dock-panel layers-panel"
        data-testid="editor-layers-area"
        [class.hidden]="activeDockPanel !== 'layers'">
        <app-layers-panel data-testid="editor-layers-panel"></app-layers-panel>
      </section>
    </aside>
  </main>
</div>
